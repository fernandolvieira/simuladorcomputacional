<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ciclo de Instrução Interativo - Prof. Fernando</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Painel de Controle Superior */
        .top-bar { display: flex; justify-content: center; gap: 15px; background: #2c3e50; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #34495e; }
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; transition: 0.2s; }
        .btn-fetch { background: #27ae60; color: white; }
        .btn-exec { background: #e67e22; color: white; opacity: 0.4; cursor: not-allowed; }
        .active { opacity: 1 !important; cursor: pointer !important; transform: scale(1.05); box-shadow: 0 0 10px rgba(255,255,255,0.2); }

        /* Layout Principal */
        .main-layout { display: grid; grid-template-columns: 1fr 300px; gap: 10px; flex-grow: 1; height: calc(100% - 100px); }
        
        /* Área da Arquitetura */
        .architecture { display: grid; grid-template-columns: 140px 1fr 140px; gap: 10px; background: #252525; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .box { border: 2px solid #444; padding: 10px; border-radius: 6px; background: #2c3e50; position: relative; }
        .cpu { grid-column: 2; background: #c0392b; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .ram { background: #2980b9; display: flex; flex-direction: column; justify-content: space-around; font-size: 0.85rem; }
        .io { background: #7f8c8d; display: flex; flex-direction: column; justify-content: center; gap: 10px; }

        /* Componentes Internos */
        .comp { background: rgba(0,0,0,0.4); padding: 5px; border-radius: 4px; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1); }
        #monitor { background: #000; color: #0f0; height: 35px; display: flex; align-items: center; justify-content: center; font-family: monospace; border: 1px solid #555; font-size: 0.8rem; }
        
        /* Log de Ações */
        .log-panel { background: #000; border: 1px solid #444; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; }
        .log-list { flex-grow: 1; overflow-y: auto; text-align: left; font-family: monospace; font-size: 0.85rem; color: #00e676; list-style: none; padding: 0; margin: 0; }
        .log-item { border-bottom: 1px solid #222; padding: 5px 0; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Animação de Dados */
        .data-point { position: absolute; width: 14px; height: 14px; background: #f1c40f; border-radius: 50%; display: none; z-index: 100; box-shadow: 0 0 8px #f1c40f; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button id="btn-fetch" class="btn-fetch active" onclick="stepFetch()">1. BUSCAR (Fetch)</button>
        <button id="btn-exec" class="btn-exec" onclick="stepExecute()">2. EXECUTAR (Execute)</button>
        <button style="background:#555; color:white" onclick="location.reload()">Reiniciar</button>
    </div>

    <div class="main-layout">
        <div class="architecture">
            <div class="box io">
                <strong>ENTRADA</strong>
                <div class="comp">🖱️ Mouse</div>
                <div class="comp">⌨️ Teclado</div>
                <button onclick="inputData()" style="font-size: 0.7rem; padding: 5px;">Enviar '7'</button>
            </div>

            <div class="box cpu" id="cpu-ui">
                <div style="grid-column: span 2; font-size: 0.9rem;">PROCESSADOR (CPU)</div>
                <div class="comp" id="uc-ui">UC<br><small id="uc-status">IDLE</small></div>
                <div class="comp" id="ula-ui">ULA<br><small id="ula-val">ACC: 0</small></div>
                <div class="comp" style="grid-column: span 2;">IR (Instrução): <span id="ir-val">---</span></div>
            </div>

            <div class="box ram" id="ram-ui">
                <strong>RAM</strong>
                <div class="comp" id="m0">0x0: SOMA 7</div>
                <div class="comp" id="m1">0x1: MOSTRA</div>
                <div class="comp" id="m2">0x2: IMPRIME</div>
            </div>
            
            <div style="grid-column: 3; display: flex; flex-direction: column; gap: 10px;">
                <div class="box io" style="min-height: 80px;">
                    <strong>SAÍDA</strong>
                    <div id="monitor">OFF</div>
                </div>
                <div class="comp">🖨️ Impressora</div>
            </div>
        </div>

        <div class="log-panel">
            <strong style="color: #888; margin-bottom: 10px; display: block;">HISTÓRICO DE AÇÕES</strong>
            <ul class="log-list" id="log-list">
                <li class="log-item">> Sistema pronto.</li>
            </ul>
        </div>
    </div>

    <div class="data-point" id="ball"></div>

    <script>
        let pc = 0, acc = 0, step = 0;
        const program = ["SOMA 7", "MOSTRA", "IMPRIME"];

        function addLog(msg) {
            const list = document.getElementById('log-list');
            const item = document.createElement('li');
            item.className = 'log-item';
            item.innerText = `[PC:0x${pc}] > ${msg}`;
            list.prepend(item);
        }

        function inputData() {
            move('io', 'ram-ui', () => {
                addLog("Dado de entrada '7' enviado para a RAM.");
            });
        }

        function stepFetch() {
            if(step !== 0) return;
            const inst = program[pc];
            document.getElementById('uc-status').innerText = "BUSCANDO...";
            
            move('ram-ui', 'cpu-ui', () => {
                document.getElementById('ir-val').innerText = inst;
                document.getElementById('uc-status').innerText = "DECODIFICANDO";
                addLog(`BUSCA: Instrução '${inst}' trazida da RAM.`);
                
                document.getElementById('btn-fetch').classList.remove('active');
                document.getElementById('btn-exec').classList.add('active');
                step = 1;
            });
        }

        function stepExecute() {
            if(step !== 1) return;
            const inst = program[pc];
            
            if(inst === "SOMA 7") {
                move('cpu-ui', 'cpu-ui', () => {
                    acc += 7;
                    document.getElementById('ula-val').innerText = "ACC: " + acc;
                    complete("EXECUTE: ULA somou 7 ao acumulador.");
                });
            } else if(inst === "MOSTRA") {
                move('cpu-ui', 'monitor', () => {
                    document.getElementById('monitor').innerText = "VALOR: " + acc;
                    complete("EXECUTE: Valor enviado para o Monitor.");
                });
            } else if(inst === "IMPRIME") {
                move('cpu-ui', 'io', () => {
                    addLog("EXECUTE: Documento enviado para a Impressora.");
                    complete("Ciclo de programa finalizado.");
                    pc = -1;
                });
            }
        }

        function complete(msg) {
            addLog(msg);
            pc++;
            step = 0;
            document.getElementById('btn-exec').classList.remove('active');
            document.getElementById('btn-fetch').classList.add('active');
        }

        function move(fromId, toId, cb) {
            const ball = document.getElementById('ball');
            const f = document.getElementById(fromId).getBoundingClientRect();
            const t = document.getElementById(toId).getBoundingClientRect();
            ball.style.display = "block";
            ball.style.left = f.left + f.width/2 + "px";
            ball.style.top = f.top + f.height/2 + "px";
            setTimeout(() => {
                ball.style.transition = "0.6s cubic-bezier(0.45, 0.05, 0.55, 0.95)";
                ball.style.left = t.left + t.width/2 + "px";
                ball.style.top = t.top + t.height/2 + "px";
            }, 50);
            setTimeout(() => { ball.style.display="none"; ball.style.transition="none"; cb(); }, 650);
        }
    </script>
</body>
</html>
